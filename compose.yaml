services:
  postgres:
    image: postgres:16-alpine
    container_name: express-postgres
    restart: unless-stopped
    env_file: env.example
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeME}
      POSTGRES_DB: ${POSTGRES_DB:-express}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d express"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: express-backend
    restart: unless-stopped
    env_file: env.example
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma db push && npx tsx prisma/seed.ts && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    container_name: express-worker
    restart: unless-stopped
    env_file: env.example
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev:worker"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: express-frontend
    restart: unless-stopped
    env_file: env.example
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
